<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TourIA</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f4f8fb;
}
header{
background:linear-gradient(135deg,#00b4db,#0083b0);
color:white;
padding:40px 20px;
text-align:center;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}
header h1{
font-size:40px;
}
header p{
margin-top:10px;
font-size:18px;
}
section{
padding:20px;
}
.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}
button{
width:100%;
padding:14px;
margin-top:15px;
background:#00b4db;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#0083b0;
}
footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 8px rgba(0,0,0,.1);
}
footer div{
text-align:center;
font-size:14px;
}
#resultado{
margin-top:15px;
font-weight:bold;
color:#0083b0;
}
</style>
</head>
<body>
<header>
<h1>🌎 TourIA</h1>
<p>Tu guía turística inteligente</p>
</header>
<section>
<div class="card">
<h2>Planifica tu viaje</h2>
<input id="destino" placeholder="Destino">
<input id="dias" type="number" placeholder="Días">
<button onclick="crearViaje()">
Crear itinerario
</button>
<p id="resultado"></p>
</div>
<div class="card">
<h2>🤖 Asistente IA</h2>
<p>
Pregunta sobre hoteles, playas,
restaurantes o actividades.
</p>
</div>
</section>
<footer>
<div>🏠<br>Inicio</div>
<div>🗺️<br>Explorar</div>
<div>🤖<br>IA</div>
<div>❤️<br>Favoritos</div>
<div>👤<br>Perfil</div>
</footer>
<script>
function crearViaje(){
let destino=document.getElementById("destino").value;
let dias=document.getElementById("dias").value;
document.getElementById("resultado").innerHTML=
"✨ Viaje creado para "+destino+
" durante "+dias+
" días.";
}
</script>
</body>
</html>
